<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 静态工具实验室</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            background-color: #dcb35c;
            border: 2px solid #8b4513;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid #8b4513;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 1;
        }
        .black { background: radial-gradient(circle at 30% 30%, #444, #000); }
        .white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #999; }
        .status { margin: 20px; font-size: 1.2rem; font-weight: bold; }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .back-link { margin-top: 20px; text-decoration: none; color: #666; }
    </style>
</head>
<body>
    <h1>五子棋</h1>
    <div class="status" id="status">轮到：黑棋</div>
    <div id="board"></div>
    <div style="margin-top: 20px;">
        <button onclick="resetGame()">重新开始</button>
    </div>
    <a href="index.html" class="back-link">返回首页</a>

    <script>
        const boardSize = 15;
        let currentPlayer = 'black';
        let gameActive = true;
        let boardState = Array(boardSize).fill().map(() => Array(boardSize).fill(null));

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleMove(r, c, cell));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleMove(r, c, cell) {
            if (!gameActive || boardState[r][c]) return;

            boardState[r][c] = currentPlayer;
            const piece = document.createElement('div');
            piece.className = `piece ${currentPlayer}`;
            cell.appendChild(piece);

            if (checkWin(r, c)) {
                statusElement.innerText = `游戏结束！${currentPlayer === 'black' ? '黑棋' : '白棋'} 获胜！`;
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            statusElement.innerText = `轮到：${currentPlayer === 'black' ? '黑棋' : '白棋'}`;
        }

        function checkWin(r, c) {
            const directions = [
                [[0, 1], [0, -1]], // 水平
                [[1, 0], [-1, 0]], // 垂直
                [[1, 1], [-1, -1]], // 主对角线
                [[1, -1], [-1, 1]]  // 副对角线
            ];

            for (let dir of directions) {
                let count = 1;
                for (let [dr, dc] of dir) {
                    let nr = r + dr;
                    let nc = c + dc;
                    while (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize && boardState[nr][nc] === currentPlayer) {
                        count++;
                        nr += dr;
                        nc += dc;
                    }
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function resetGame() {
            currentPlayer = 'black';
            gameActive = true;
            boardState = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
            statusElement.innerText = '轮到：黑棋';
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
